services:
  app:
    build:
      context: ..
      dockerfile: docker/single.Dockerfile
    container_name: inventory-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18080}:80"
    volumes:
      - ../app:/app/app
      - ../frontend:/app/frontend
      - ../uploads:/app/uploads
      - ../data:/app/data
